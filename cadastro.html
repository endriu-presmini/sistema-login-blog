<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Projeto Web</title>
  <link rel="stylesheet" href="stylecad.css" />
</head>
<body>

  <nav>
    <span class="nav-logo">Projeto Web</span>
    <div class="nav-links">
      <a href="login.html">Login</a>
      <a href="tela1.html">Blog</a>
    </div>
  </nav>

  <main class="cadastro-wrapper">
    <div class="cadastro-card">

      <div class="cadastro-header">
        <h1>Criar Conta</h1>
        <p>Preencha os dados para se cadastrar</p>
      </div>

      <form action="#" method="post">

        <div class="field">
          <label for="nome">Nome completo</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Seu nome"
            required
          />
        </div>

        <div class="field">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="••••••••"
            required
          />
        </div>

        <div class="field">
          <label for="confirmar">Confirmar senha</label>
          <input
            type="password"
            id="confirmar"
            name="confirmar"
            placeholder="••••••••"
            required
          />
        </div>

        <a href="login.html" class="btn-cadastrar">Cadastrar</a>

        <a href="login.html" class="btn-voltar">← Voltar ao Login</a>

      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Projeto Web — Trabalho de Desenvolvimento Web</p>
  </footer>

</body>
</html>
